{{define "layout"}}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{template "title" .}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="/static/css/style.css?v={{staticVer}}">
  <link rel="shortcut icon" href="/static/assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
  {{block "extra_css" .}}{{end}}
  <!-- GA -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TLE4DOSLVG"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TLE4DOSLVG', { anonymize_ip: true });
  </script>
</head>
<body>
  <header class="Header">
    <div class="Header-logo">
      <a href="/login"><img src="/static/assets/logo.svg" alt="logo" /></a>
    </div>
    <div class="Header-title">
      <h1>JbearP Blog</h1>
      <span>Tecnología · Historias</span>
    </div>
    <div class="Header-social">
      <ul>
        <li><a href="http://github.com/Jeanpigi" target="_blank" rel="noreferrer" aria-label="GitHub"><i class="fa-brands fa-github"></i></a></li>
        <li><a href="https://www.instagram.com/jean_pierre_gio/" target="_blank" rel="noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a></li>
        <li><a href="https://www.youtube.com/channel/UCXNcM9LiqXfXgKU8HIwg9Xg" target="_blank" rel="noreferrer" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a></li>
      </ul>
    </div>
  </header>

  <nav class="Nav-container" aria-label="Navegación principal">
    <button class="hamburger" aria-label="Abrir menú" aria-expanded="false">&#9776;</button>
    <ul role="list">
      <li><a href="/">Inicio</a></li>
      <li><a href="/blog">Blog</a></li>
      <li><a href="/historias">Historias</a></li>
      <li><a href="/tecnologias">Tecnología</a></li>
      <li><a href="/portafolio">Portafolio</a></li>
    </ul>
  </nav>

  <main class="main-content">
    {{template "content" .}}
  </main>

  <footer class="Footer">
    <div class="Footer-container">
      <div class="Footer-content">
        <div class="Footer-copy">Hecho con 💜 por JbearP</div>
        <div class="Footer-go">Full Power by Go 🐹</div>
      </div>
    </div>
  </footer>

  <script src="/static/js/burguerButton.js?v={{staticVer}}"></script>
</body>
</html>
{{end}}
