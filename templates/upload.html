{{define "title"}}Subir Música{{end}}

{{define "extra_css"}}
<link rel="stylesheet" href="/static/css/upload.css?v={{staticVer}}">
{{end}}

{{define "content"}}
<div class="upload-wrapper">

  <nav class="upload-breadcrumbs">
    <a href="/dashboard">Dashboard</a>
    <span>/</span>
    <span>Subir música</span>
  </nav>

  <div class="upload-card">
    <div class="upload-header">
      <i class="fa fa-music upload-icon-header"></i>
      <h1>Radio — Subir pistas</h1>
      <p>Formatos aceptados: <strong>MP3</strong> · máx. 20 MB por archivo · hasta 5 a la vez</p>
    </div>

    <form id="uploadForm" action="/radio/upload" method="post" enctype="multipart/form-data">

      <!-- Zona drag-and-drop -->
      <label class="drop-zone" id="dropZone" for="musicFile">
        <i class="fa fa-cloud-upload-alt drop-icon"></i>
        <span class="drop-text">Arrastra tus MP3 aquí</span>
        <span class="drop-hint">o haz clic para seleccionar</span>
        <input id="musicFile" type="file" name="musicFiles" accept=".mp3,audio/mpeg" multiple required>
      </label>

      <!-- Lista de archivos seleccionados -->
      <ul class="file-list" id="fileList"></ul>

      <button id="submitButton" type="submit" class="upload-btn" disabled>
        <i class="fa fa-upload"></i>
        <span>Subir</span>
      </button>

    </form>

    <div class="upload-footer">
      <a href="/dashboard" class="back-link">
        <i class="fa fa-arrow-left"></i> Volver al dashboard
      </a>
    </div>
  </div>

</div>

<script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script defer src="/static/js/upload.js?v={{staticVer}}"></script>
{{end}}
